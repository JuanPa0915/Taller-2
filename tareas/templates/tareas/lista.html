<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <title>CRUD Tareas</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4">📋 Lista de Tareas</h1>
        <a href="{% url 'crear_tarea' %}" class="btn btn-primary mb-3">+ Nueva Tarea</a>
        
        <div class="card shadow">
            <table class="table m-0">
                <thead class="table-dark">
                    <tr>
                        <th>Tarea</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for t in tareas %}
                    <tr>
                        <td>{{ t.titulo }}</td>
                        <td>{{ t.completada|yesno:"Completada,Pendiente" }}</td>
                        <td>
                            <a href="{% url 'editar_tarea' t.id %}" class="btn btn-sm btn-warning">Editar</a>
                            <a href="{% url 'eliminar_tarea' t.id %}" class="btn btn-sm btn-danger">Borrar</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">No hay tareas. ¡Crea la primera!</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
