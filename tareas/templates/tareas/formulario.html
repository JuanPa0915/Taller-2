<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear/Editar Tarea</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}?v=4" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <style>
        .form-check-label {
            margin-left: 0.35rem;
        }
        .card-body h2 {
            color: var(--white);
        }
    </style>
</head>
<body>
<div class="hero-header">
    <h1><i class="bi bi-card-checklist me-2"></i> LISTA DE TAREAS</h1>
</div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <h2 class="mb-4"><i class="bi bi-journal-text me-2"></i>Detalles de la Tarea</h2>
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_titulo" class="form-label">Título</label>
                    {{ form.titulo }}
                </div>

                <div class="mb-3">
                    <label for="id_descripcion" class="form-label">Descripción</label>
                    {{ form.descripcion }}
                </div>

                <div class="form-check mb-3">
                    {{ form.completada }}
                    <label class="form-check-label" for="id_completada">Completada</label>
                </div>

                <button type="submit" class="btn btn-success me-2"><i class="bi bi-save me-1"></i>Guardar</button>
                <a href="{% url 'lista_tareas' %}" class="btn btn-secondary"><i class="bi bi-x-circle me-1"></i>Cancelar</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
